<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Health Support Assistant</title>

<style>
/* ===== Page Styling ===== */
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#e3f2fd,#ffffff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Container */
.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    width:80%;
    max-width:600px;
}

/* Heading */
h1{
    color:#0d47a1;
    margin-bottom:10px;
}

/* Description */
p{
    color:#555;
    font-size:18px;
}

/* Button Style */
.btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#1976d2;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#0d47a1;
}
</style>
</head>

<body>

<div class="container">
    <h1>Health Support Assistant</h1>
    <p>Your AI healthcare helper is ready to assist you.</p>
    <button class="btn">Chat with Assistant</button>
</div>

<!-- ===== IBM Watson Assistant Chat ===== -->
<script>
window.watsonAssistantChatOptions = {
  integrationID: "8ea9bd65-b146-4cb8-8483-eaca4171b45f",
  region: "eu-de",
  serviceInstanceID: "fc5b6242-e30a-4605-a8c4-8f47c7a75bf9",
  onLoad: async (instance) => { await instance.render(); }
};

setTimeout(function(){
  const t=document.createElement('script');
  t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/"
  + (window.watsonAssistantChatOptions.clientVersion || 'latest')
  + "/WatsonAssistantChatEntry.js";
  document.head.appendChild(t);
});
</script>

</body>
</html>
